<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIO - RCP Builder: Inicial [Wireframe]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: #f5f5f5;
            padding: 40px 20px;
            color: #000;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        /* Form */
        .form-container {
            background: #fff;
            border: 2px solid #000;
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .required {
            color: #000;
        }
        
        .input,
        .select {
            width: 100%;
            padding: 10px;
            border: 2px solid #000;
            font-family: inherit;
            font-size: 13px;
            background: #fff;
        }
        
        .select {
            cursor: pointer;
        }
        
        .input::placeholder {
            color: #999;
        }
        
        /* Buttons */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 13px;
            border: 2px solid #000;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: #fff;
            color: #000;
        }
        
        .btn-secondary:hover {
            background: #f0f0f0;
        }
        
        .btn-primary {
            background: #000;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="title">CREAR NUEVA VACANTE</h1>
        </div>
        
        <!-- Form -->
        <div class="form-container">
            <!-- Area interna -->
            <div class="form-group">
                <label class="label">
                    Área interna que solicita <span class="required">*</span>
                </label>
                <select class="select">
                    <option value="">Selecciona un área</option>
                    <option value="rrhh">Recursos Humanos</option>
                    <option value="ventas">Ventas</option>
                    <option value="operaciones">Operaciones</option>
                    <option value="finanzas">Finanzas</option>
                    <option value="logistica">Logística</option>
                    <option value="atencion">Atención al Cliente</option>
                    <option value="admin">Administración</option>
                    <option value="compras">Compras</option>
                    <option value="legal">Legal</option>
                </select>
            </div>
            
            <!-- Nombre del cargo -->
            <div class="form-group">
                <label class="label">
                    Nombre del cargo <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    class="input" 
                    placeholder="Ej: Coordinador de Logística"
                />
            </div>
            
            <!-- Fecha esperada -->
            <div class="form-group">
                <label class="label">
                    Fecha esperada de ingreso <span class="required">*</span>
                </label>
                <input 
                    type="date" 
                    class="input"
                />
            </div>
            
            <!-- Tipo de vacante -->
            <div class="form-group">
                <label class="label">
                    ¿Es vacante nueva o reemplazo? <span class="required">*</span>
                </label>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                        <input type="radio" name="vacancy-type" value="nueva" style="width: 16px; height: 16px;">
                        Vacante nueva
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                        <input type="radio" name="vacancy-type" value="reemplazo" style="width: 16px; height: 16px;">
                        Reemplazo
                    </label>
                </div>
            </div>
            
            <!-- Divider -->
            <div style="border-top: 2px solid #000; margin: 30px 0;"></div>
            
            <!-- Upload section -->
            <div class="form-group">
                <label class="label">
                    Sube el Job Description <span class="required">*</span>
                </label>
                
                <div style="border: 3px dashed #000; padding: 60px 20px; text-align: center; background: #fafafa; margin-top: 10px;">
                    <div style="font-size: 48px; margin-bottom: 15px;">📤</div>
                    <div style="font-size: 14px; margin-bottom: 8px;">Arrastra archivo aquí</div>
                    <div style="font-size: 11px; color: #666; margin-bottom: 15px;">o haz clic para buscar</div>
                    
                    <button class="btn" style="display: inline-block; padding: 10px 20px; font-size: 12px;">BUSCA ENTRE TUS ARCHIVOS</button>
                    
                    <div style="font-size: 11px; color: #666; margin-top: 10px;">PDF, DOCX - Max 10MB</div>
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="button-group">
                <button class="btn btn-secondary">CANCELAR</button>
                <button class="btn btn-primary">ANALIZAR DOCUMENTO →</button>
            </div>
        </div>
    </div>
</body>
</html>
