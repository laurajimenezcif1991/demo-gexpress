<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./unio-SM.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Transportes · Unio</title>
    <!-- GitHub Pages SPA: restore original path from the 404.html redirect -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
      // Also handle the ?p= query param approach
      (function () {
        var l = window.location;
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').reduce(function (o, s) {
            var parts = s.split('=');
            o[parts[0]] = parts.slice(1).join('=').replace(/~and~/g, '&');
            return o;
          }, {});
          if (decoded.p !== undefined) {
            window.history.replaceState(
              null, null,
              l.pathname.slice(0, -1) + (decoded.p || '') +
              (decoded.q ? '?' + decoded.q : '') +
              l.hash
            );
          }
        }
      })();
    </script>
