<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Comfandi Demo</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encodes the full path as a query param and redirects to the base index.html.
      // The index.html then reads it back and restores the original URL.
      var segmentCount = 1; // number of path segments in the base (1 = /comfandi-demo/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
